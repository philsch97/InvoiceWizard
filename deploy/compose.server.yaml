services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: InvoiceWizard.Backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__PostgreSql: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    ports:
      - "${BACKEND_HTTP_PORT}:8080"

  web:
    build:
      context: ..
      dockerfile: InvoiceWizard.Web/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Backend__BaseUrl: http://backend:8080/
    ports:
      - "${WEB_HTTP_PORT}:8080"

volumes:
  postgres-data:
