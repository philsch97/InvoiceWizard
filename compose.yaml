services:
  postgres:
    image: postgres:17
    container_name: invoicewizard-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-invoicewizard}
      POSTGRES_USER: ${POSTGRES_USER:-invoicewizard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-invoicewizard}
    ports:
      - "5432:5432"
    volumes:
      - ${POSTGRES_HOST_DATA_DIR:-E:/InvoiceWizard/data/postgres}:/var/lib/postgresql/data
